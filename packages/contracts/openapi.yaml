openapi: 3.1.0
info:
  title: Sales Operations CRM API
  version: 0.1.0
  description: Combined Phase 0 foundation, Phase 1 Users & RBAC, and Phase 2
    Leads Core API contract.
servers:
  - url: http://localhost:3001
    description: Local API
security:
  - sessionCookie: []
paths:
  /health/live:
    get:
      summary: Liveness check
      security: []
      responses:
        "200":
          description: API process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /health/ready:
    get:
      summary: Readiness check
      security: []
      responses:
        "200":
          description: Foundation dependencies are ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessStatus"
        "503":
          description: One or more dependencies are not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessStatus"
  /auth/login:
    post:
      summary: Sign in with the seeded Admin user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "204":
          description: Login accepted; secure session cookie set
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HttpOnly secure session cookie
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/logout:
    post:
      summary: Sign out and revoke the active session
      responses:
        "204":
          description: Logout accepted; session revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/me:
    get:
      summary: Return current foundation session and role categories
      responses:
        "200":
          description: Authenticated foundation user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /foundation/protected-shell/access:
    get:
      summary: Verify protected shell access
      responses:
        "200":
          description: Access allowed for authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessDecision"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /foundation/smoke-events:
    post:
      summary: Trigger a non-business smoke event and background job
      responses:
        "202":
          description: Smoke event recorded and job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmokeEventAccepted"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /foundation/jobs/{jobId}:
    get:
      summary: Get smoke background job status
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Smoke job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /users:
    get:
      summary: Search platform users
      responses:
        "200":
          description: User search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      summary: Create a platform user and activation path
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetail"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /users/{userId}:
    get:
      summary: Get platform user detail
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    patch:
      summary: Update platform user
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /users/{userId}/activation:
    post:
      summary: Resend activation path
      responses:
        "202":
          description: Activation path issued
  /activation/complete:
    post:
      summary: Complete initial credential setup
      security: []
      responses:
        "204":
          description: Activation completed
  /users/{userId}/roles:
    put:
      summary: Replace user business roles
      responses:
        "200":
          description: Updated roles
  /users/{userId}/reviewer-access:
    put:
      summary: Grant or remove read-only operations reviewer access
      responses:
        "200":
          description: Updated reviewer access
  /permissions/matrix:
    get:
      summary: Get fixed Phase 1 permission matrix
      responses:
        "200":
          description: Permission matrix
  /teams:
    get:
      summary: List teams
      responses:
        "200":
          description: Team list
    post:
      summary: Create a team
      responses:
        "201":
          description: Team created
  /teams/{teamId}:
    patch:
      summary: Update or deactivate a team
      responses:
        "200":
          description: Updated team
  /teams/{teamId}/members:
    put:
      summary: Replace active team membership
      responses:
        "200":
          description: Updated team memberships
  /audit/security:
    get:
      summary: Search security audit records
      responses:
        "200":
          description: Security audit records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditSearchResponse"
  /leads:
    get:
      summary: Search visible leads
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/LeadStatus"
        - $ref: "#/components/parameters/LeadSource"
        - $ref: "#/components/parameters/Priority"
        - $ref: "#/components/parameters/OwnerUserId"
        - $ref: "#/components/parameters/TeamId"
        - $ref: "#/components/parameters/ExhibitionText"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Lead search results scoped to the authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      summary: Create a lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadRequest"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadDetail"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/DuplicateLeadConflict"
  /leads/{leadId}:
    get:
      summary: Get lead detail
      parameters:
        - $ref: "#/components/parameters/LeadId"
      responses:
        "200":
          description: Lead detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Update lead contact, source, priority, budget, or exhibition reference
      parameters:
        - $ref: "#/components/parameters/LeadId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadRequest"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadDetail"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/StaleUpdate"
  /leads/{leadId}/assignment:
    put:
      summary: Assign or reassign a lead
      parameters:
        - $ref: "#/components/parameters/LeadId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignLeadRequest"
      responses:
        "200":
          description: Lead assignment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadDetail"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/StaleUpdate"
  /leads/{leadId}/status:
    put:
      summary: Change lead status
      parameters:
        - $ref: "#/components/parameters/LeadId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeLeadStatusRequest"
      responses:
        "200":
          description: Lead status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadDetail"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/StaleUpdate"
  /leads/{leadId}/notes:
    post:
      summary: Add an append-only lead note
      parameters:
        - $ref: "#/components/parameters/LeadId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddLeadNoteRequest"
      responses:
        "201":
          description: Lead note added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadNote"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "412":
          $ref: "#/components/responses/StaleUpdate"
  /leads/{leadId}/history:
    get:
      summary: Get lead history
      parameters:
        - $ref: "#/components/parameters/LeadId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Lead history entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadHistoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /leads/sources:
    get:
      summary: List selectable lead sources
      responses:
        "200":
          description: Lead sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadSourceListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: crm_session
  responses:
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required or session invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated user lacks required permission
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found or not visible to the authenticated user
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Request conflicts with lead state, assignment, or status rules
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    DuplicateLeadConflict:
      description: Active lead with matching email or phone already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DuplicateLeadError"
    StaleUpdate:
      description: Lead was changed by another user; reload before retrying
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthStatus:
      type: object
      required:
        - status
        - checkedAt
        - correlationId
      properties:
        status:
          type: string
          enum:
            - UP
        checkedAt:
          type: string
          format: date-time
        correlationId:
          type: string
    ReadinessStatus:
      type: object
      required:
        - status
        - services
        - checkedAt
        - correlationId
      properties:
        status:
          type: string
          enum:
            - UP
            - DEGRADED
            - DOWN
        checkedAt:
          type: string
          format: date-time
        correlationId:
          type: string
        services:
          type: array
          items:
            type: object
            required:
              - name
              - status
            properties:
              name:
                type: string
                enum:
                  - api
                  - database
                  - cache
                  - queue
              status:
                type: string
                enum:
                  - UP
                  - DEGRADED
                  - DOWN
              message:
                type: string
    LoginRequest:
      type: object
      required:
        - email
        - password
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          maxLength: 320
        password:
          type: string
          minLength: 12
          maxLength: 128
    CurrentUser:
      type: object
      required:
        - id
        - email
        - displayName
        - roles
        - correlationId
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        roles:
          type: array
          items:
            type: string
            enum:
              - ADMIN
              - MANAGER
              - SALES_REPRESENTATIVE
        correlationId:
          type: string
    AccessDecision:
      type: object
      required:
        - decision
        - resource
        - action
        - reason
        - correlationId
        - decidedAt
      properties:
        decision:
          type: string
          enum:
            - ALLOW
            - DENY
        resource:
          type: string
        action:
          type: string
        reason:
          type: string
        correlationId:
          type: string
        decidedAt:
          type: string
          format: date-time
    SmokeEventAccepted:
      type: object
      required:
        - eventId
        - jobId
        - status
        - correlationId
      properties:
        eventId:
          type: string
          format: uuid
        jobId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - QUEUED
        correlationId:
          type: string
    JobStatus:
      type: object
      required:
        - jobId
        - jobType
        - status
        - attempts
        - maxAttempts
        - correlationId
      properties:
        jobId:
          type: string
          format: uuid
        jobType:
          type: string
          enum:
            - FOUNDATION_SMOKE_JOB
        status:
          type: string
          enum:
            - QUEUED
            - RUNNING
            - COMPLETED
            - FAILED
            - RETRYING
        attempts:
          type: integer
          minimum: 0
        maxAttempts:
          type: integer
          minimum: 1
        lastError:
          type: string
          nullable: true
        correlationId:
          type: string
    ErrorResponse:
      type: object
      required:
        - code
        - message
        - correlationId
      additionalProperties: false
      properties:
        code:
          type: string
        message:
          type: string
        correlationId:
          type: string
    UserDetail:
      type: object
      required:
        - id
        - email
        - displayName
        - status
        - roles
        - hasReviewerAccess
        - correlationId
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        status:
          type: string
          enum:
            - PENDING_ACTIVATION
            - ACTIVE
            - DISABLED
        roles:
          type: array
          items:
            type: string
            enum:
              - ADMIN
              - MANAGER
              - SALES_REPRESENTATIVE
        hasReviewerAccess:
          type: boolean
        correlationId:
          type: string
    UserListResponse:
      type: object
      required:
        - items
        - page
        - pageSize
        - total
        - correlationId
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/UserDetail"
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        correlationId:
          type: string
    AuditSearchResponse:
      type: object
      required:
        - items
        - page
        - pageSize
        - total
        - correlationId
      properties:
        items:
          type: array
          items:
            type: object
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        correlationId:
          type: string
    LeadStatus:
      type: string
      enum:
        - NEW
        - CONTACTED
        - QUALIFIED
        - NEGOTIATION
        - WON
        - LOST
        - ARCHIVED
    LeadPriority:
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH
        - URGENT
    LeadSource:
      type: object
      required:
        - code
        - name
        - status
      additionalProperties: false
      properties:
        code:
          type: string
        name:
          type: string
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
    ExhibitionReference:
      type: object
      required:
        - name
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 160
        date:
          type: string
          format: date
          nullable: true
        location:
          type: string
          maxLength: 160
          nullable: true
    LeadSummary:
      type: object
      required:
        - id
        - displayName
        - sourceCode
        - status
        - priority
        - ownerUserId
        - createdByUserId
        - version
        - createdAt
        - updatedAt
        - correlationId
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        company:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        sourceCode:
          type: string
        status:
          $ref: "#/components/schemas/LeadStatus"
        priority:
          $ref: "#/components/schemas/LeadPriority"
        budgetAmount:
          type: number
          nullable: true
        budgetCurrency:
          type: string
          minLength: 3
          maxLength: 3
          nullable: true
        ownerUserId:
          type: string
          format: uuid
        ownerDisplayName:
          type: string
          nullable: true
        teamId:
          type: string
          format: uuid
          nullable: true
        createdByUserId:
          type: string
          format: uuid
        exhibitionReference:
          $ref: "#/components/schemas/ExhibitionReference"
        version:
          type: integer
          minimum: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        correlationId:
          type: string
    LeadDetail:
      allOf:
        - $ref: "#/components/schemas/LeadSummary"
        - type: object
          required:
            - notes
            - assignmentHistory
            - statusHistory
            - permissions
          properties:
            notes:
              type: array
              items:
                $ref: "#/components/schemas/LeadNote"
            assignmentHistory:
              type: array
              items:
                $ref: "#/components/schemas/LeadAssignmentHistory"
            statusHistory:
              type: array
              items:
                $ref: "#/components/schemas/LeadStatusHistory"
            permissions:
              type: object
              required:
                - canUpdate
                - canAssign
                - canChangeStatus
                - canAddNote
                - canViewHistory
              additionalProperties: false
              properties:
                canUpdate:
                  type: boolean
                canAssign:
                  type: boolean
                canChangeStatus:
                  type: boolean
                canAddNote:
                  type: boolean
                canViewHistory:
                  type: boolean
    LeadListResponse:
      type: object
      required:
        - items
        - page
        - pageSize
        - total
        - correlationId
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LeadSummary"
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        correlationId:
          type: string
    CreateLeadRequest:
      type: object
      required:
        - sourceCode
        - priority
        - ownerUserId
      additionalProperties: false
      properties:
        displayName:
          type: string
          maxLength: 160
        company:
          type: string
          maxLength: 160
        email:
          type: string
          format: email
          maxLength: 320
        phone:
          type: string
          maxLength: 40
        sourceCode:
          type: string
        priority:
          $ref: "#/components/schemas/LeadPriority"
        ownerUserId:
          type: string
          format: uuid
        budgetAmount:
          type: number
          minimum: 0
        budgetCurrency:
          type: string
          minLength: 3
          maxLength: 3
        exhibitionReference:
          $ref: "#/components/schemas/ExhibitionReference"
        initialNote:
          type: string
          maxLength: 4000
    UpdateLeadRequest:
      type: object
      required:
        - version
      additionalProperties: false
      properties:
        displayName:
          type: string
          maxLength: 160
        company:
          type: string
          maxLength: 160
        email:
          type: string
          format: email
          maxLength: 320
        phone:
          type: string
          maxLength: 40
        sourceCode:
          type: string
        priority:
          $ref: "#/components/schemas/LeadPriority"
        budgetAmount:
          type: number
          minimum: 0
          nullable: true
        budgetCurrency:
          type: string
          minLength: 3
          maxLength: 3
          nullable: true
        exhibitionReference:
          $ref: "#/components/schemas/ExhibitionReference"
        version:
          type: integer
          minimum: 1
    AssignLeadRequest:
      type: object
      required:
        - ownerUserId
        - version
      additionalProperties: false
      properties:
        ownerUserId:
          type: string
          format: uuid
        reason:
          type: string
          maxLength: 500
        version:
          type: integer
          minimum: 1
    ChangeLeadStatusRequest:
      type: object
      required:
        - status
        - version
      additionalProperties: false
      properties:
        status:
          $ref: "#/components/schemas/LeadStatus"
        reason:
          type: string
          maxLength: 500
        version:
          type: integer
          minimum: 1
    AddLeadNoteRequest:
      type: object
      required:
        - body
        - version
      additionalProperties: false
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 4000
        version:
          type: integer
          minimum: 1
    LeadNote:
      type: object
      required:
        - id
        - leadId
        - authorUserId
        - body
        - createdAt
        - correlationId
      properties:
