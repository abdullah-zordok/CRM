openapi: 3.1.0
info:
  title: Foundation Architecture API
  version: 0.1.0
  description: >
    Phase 0 contract for health/readiness, minimal authentication, protected
    shell session state, security audit readiness, and smoke event/job
    verification. No CRM business records are exposed by this contract.
servers:
  - url: http://localhost:3001
    description: Local API
security:
  - sessionCookie: []
paths:
  /health/live:
    get:
      summary: Liveness check
      security: []
      responses:
        "200":
          description: API process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /health/ready:
    get:
      summary: Readiness check
      security: []
      responses:
        "200":
          description: Foundation dependencies are ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessStatus"
        "503":
          description: One or more dependencies are not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessStatus"
  /auth/login:
    post:
      summary: Sign in with the seeded Admin user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "204":
          description: Login accepted; secure session cookie set
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HttpOnly secure session cookie
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/logout:
    post:
      summary: Sign out and revoke the active session
      responses:
        "204":
          description: Logout accepted; session revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/me:
    get:
      summary: Return current foundation session and role categories
      responses:
        "200":
          description: Authenticated foundation user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /foundation/protected-shell/access:
    get:
      summary: Verify protected shell access
      responses:
        "200":
          description: Access allowed for authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessDecision"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /foundation/smoke-events:
    post:
      summary: Trigger a non-business smoke event and background job
      responses:
        "202":
          description: Smoke event recorded and job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmokeEventAccepted"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /foundation/jobs/{jobId}:
    get:
      summary: Get smoke background job status
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Smoke job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: crm_session
  responses:
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required or session invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated user lacks required role category
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthStatus:
      type: object
      required: [status, checkedAt, correlationId]
      properties:
        status:
          type: string
          enum: [UP]
        checkedAt:
          type: string
          format: date-time
        correlationId:
          type: string
    ReadinessStatus:
      type: object
      required: [status, services, checkedAt, correlationId]
      properties:
        status:
          type: string
          enum: [UP, DEGRADED, DOWN]
        checkedAt:
          type: string
          format: date-time
        correlationId:
          type: string
        services:
          type: array
          items:
            type: object
            required: [name, status]
            properties:
              name:
                type: string
                enum: [api, database, cache, queue]
              status:
                type: string
                enum: [UP, DEGRADED, DOWN]
              message:
                type: string
    LoginRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          maxLength: 320
        password:
          type: string
          minLength: 12
          maxLength: 128
    CurrentUser:
      type: object
      required: [id, email, displayName, roles, correlationId]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        roles:
          type: array
          items:
            type: string
            enum: [ADMIN, MANAGER, SALES_REPRESENTATIVE]
        correlationId:
          type: string
    AccessDecision:
      type: object
      required: [decision, resource, action, reason, correlationId, decidedAt]
      properties:
        decision:
          type: string
          enum: [ALLOW, DENY]
        resource:
          type: string
        action:
          type: string
        reason:
          type: string
        correlationId:
          type: string
        decidedAt:
          type: string
          format: date-time
    SmokeEventAccepted:
      type: object
      required: [eventId, jobId, status, correlationId]
      properties:
        eventId:
          type: string
          format: uuid
        jobId:
          type: string
          format: uuid
        status:
          type: string
          enum: [QUEUED]
        correlationId:
          type: string
    JobStatus:
      type: object
      required: [jobId, jobType, status, attempts, maxAttempts, correlationId]
      properties:
        jobId:
          type: string
          format: uuid
        jobType:
          type: string
          enum: [FOUNDATION_SMOKE_JOB]
        status:
          type: string
          enum: [QUEUED, RUNNING, COMPLETED, FAILED, RETRYING]
        attempts:
          type: integer
          minimum: 0
        maxAttempts:
          type: integer
          minimum: 1
        lastError:
          type: string
          nullable: true
        correlationId:
          type: string
    ErrorResponse:
      type: object
      required: [code, message, correlationId]
      additionalProperties: false
      properties:
        code:
          type: string
        message:
          type: string
        correlationId:
          type: string
